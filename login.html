<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Técnico | AB Informática Solutions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23003366'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='%23f37021' font-size='14' font-family='Arial' font-weight='bold'%3EAB%3C/text%3E%3C/svg%3E">
    
    <style>
        .login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 120px);
            background-color: var(--cinza-fundo);
            padding: 20px;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 51, 102, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            color: var(--azul-escuro);
            margin-bottom: 10px;
            font-size: 26px;
        }
        .login-card p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--texto-escuro);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--azul-claro);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--azul-escuro);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background-color: var(--azul-claro);
        }
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-body">
        <div class="login-card">
            <h2>Área Restrita</h2>
            <p>Acesso exclusivo para Administradores e Técnicos</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">E-mail Corporativo</label>
                    <input type="email" id="email" required placeholder="tecnico@ab-informatica.com">
                </div>
                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn" id="btn-entrar">Entrar no Painel</button>
                <div class="error-message" id="error-msg">E-mail ou palavra-passe incorretos.</div>
            </form>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
