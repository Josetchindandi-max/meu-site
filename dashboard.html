<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Técnico | AB Informática Solutions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23003366'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='%23f37021' font-size='14' font-family='Arial' font-weight='bold'%3EAB%3C/text%3E%3C/svg%3E">
    
    <style>
        /* Bloqueia a visualização inicial por segurança até o Firebase confirmar o login */
        body { 
            display: none; 
            background-color: var(--cinza-fundo); 
            padding-top: 40px;
        }
        
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .dash-header h1 {
            color: var(--azul-escuro);
            font-size: 24px;
        }
        .dash-header p {
            color: #64748b;
            font-size: 14px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .logout-btn:hover { 
            background: #dc2626; 
        }
        
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .dash-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .dash-card h3 {
            color: var(--azul-claro);
            margin-bottom: 15px;
            border-bottom: 2px solid var(--cinza-fundo);
            padding-bottom: 10px;
            font-size: 18px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .stats span { 
            font-weight: bold; 
            color: var(--laranja); 
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="dash-header">
            <div>
                <h1>Painel de Gestão Técnica</h1>
                <p>Área restrita da AB Informática Solutions</p>
            </div>
            <div class="user-info">
                <span>Utilizador: <strong id="user-email">A carregar...</strong></span>
                <button class="logout-btn" id="btn-logout">Sair</button>
            </div>
        </div>

        <div class="dash-grid">
            <div class="dash-card">
                <h3>Ordens de Serviço (O.S.)</h3>
                <div class="stats"><p>Manutenções Pendentes:</p><span>5</span></div>
                <div class="stats"><p>Redes em Curso:</p><span>2</span></div>
                <div class="stats"><p>Concluídas este mês:</p><span>14</span></div>
            </div>

            <div class="dash-card">
                <h3>Pedidos de Contacto</h3>
                <p style="font-size: 14px; color: #64748b; margin-bottom: 15px;">
                    Mensagens enviadas através do site principal.
                </p>
                <div class="stats"><p>Novos Pedidos:</p><span style="color: green;">3 Novos</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ⚠️ COLA AQUI AS MESMAS CHAVES QUE METESTE NO TEU FICHEIRO AUTH.JS
        const firebaseConfig = {
            apiKey: "AIzaSyAWaRPM6MswWA7gDZiyInuAmAC333RWCrg",
  authDomain: "ab-informatica-solutions.firebaseapp.com",
  projectId: "ab-informatica-solutions",
  storageBucket: "ab-informatica-solutions.firebasestorage.app",
  messagingSenderId: "569361421220",
  appId: "1:569361421220:web:723f827a621b58faf0a731"
        };

        // Inicializar
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const userEmailSpan = document.getElementById("user-email");
        const btnLogout = document.getElementById("btn-logout");

        // Guarda-costas ativo: Verifica se o utilizador está mesmo logado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Se estiver logado, exibe o conteúdo da página e coloca o e-mail no topo
                document.body.style.display = "block";
                userEmailSpan.textContent = user.email;
            } else {
                // Se não estiver logado, redireciona imediatamente para o login
                window.location.href = "login.html";
            }
        });

        // Evento para o botão Sair
        if (btnLogout) {
            btnLogout.addEventListener("click", () => {
                signOut(auth).then(() => {
                    window.location.href = "login.html";
                });
            });
        }
    </script>
</body>
</html>
